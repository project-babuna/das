<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .light-mark { display: block; }
    .dark-mark { display: none; }
    @media (prefers-color-scheme: light) {
      .light-mark { display: none; }
      .dark-mark { display: block; }
    }
  </style>
  <image class="light-mark" href="data:image/png;base64," width="64" height="64" />
  <image class="dark-mark" href="data:image/png;base64," width="64" height="64" />
</svg>
